<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MacroCal">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Macro Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    padding: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  h1 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .subtitle { color: #555; font-size: 11px; margin-bottom: 10px; }

  /* Alert banner */
  .alert-banner {
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert-safe    { background:#0f2b14; border:1px solid #1a5c28; color:#4ade80; }
  .alert-caution { background:#2b220f; border:1px solid #7f4f1d; color:#fb923c; }
  .alert-danger  { background:#2b0f0f; border:1px solid #7f1d1d; color:#f87171; }

  /* News alert — gros event live */
  .news-alert {
    background: #1a0a0a;
    border: 2px solid #ef4444;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    animation: pulse-border 2s infinite;
  }
  .news-alert-label {
    font-size: 10px;
    font-weight: 700;
    color: #ef4444;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .news-alert-title { color: #fca5a5; font-size: 12px; line-height: 1.4; }
  .news-alert-source { font-size: 10px; color: #666; margin-top: 3px; }

  @keyframes pulse-border {
    0%, 100% { border-color: #ef4444; }
    50% { border-color: #7f1d1d; }
  }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .tab {
    padding: 5px 14px; border-radius: 4px; cursor: pointer;
    font-size: 12px; color: #888; border: 1px solid #222; background: #111;
  }
  .tab.active { background: #1a1a2e; color: #818cf8; border-color: #818cf8; }

  /* Section title */
  .section-title {
    font-size: 10px; color: #555; text-transform: uppercase;
    letter-spacing: 1px; margin: 12px 0 6px; display: flex;
    align-items: center; gap: 6px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: #1a1a1a;
  }

  /* Events */
  .day-label {
    font-size: 10px; color: #444; text-transform: uppercase;
    letter-spacing: 1px; margin: 8px 0 4px; padding-left: 2px;
  }
  .event {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 10px; border-radius: 6px; margin-bottom: 3px;
    background: #111; border-left: 3px solid transparent;
  }
  .event.high    { border-left-color: #ef4444; }
  .event.medium  { border-left-color: #f59e0b; }
  .event.low     { border-left-color: #374151; }
  .event.earnings{ border-left-color: #818cf8; }

  .event-dot { width:8px; height:8px; border-radius:50%; margin-top:3px; flex-shrink:0; }
  .high .event-dot     { background:#ef4444; }
  .medium .event-dot   { background:#f59e0b; }
  .low .event-dot      { background:#374151; }
  .earnings .event-dot { background:#818cf8; }

  .event-time { color:#666; font-size:11px; min-width:42px; padding-top:1px; }
  .event-body { flex:1; }
  .event-title { color:#e0e0e0; line-height:1.3; }
  .event-title.high { color:#fca5a5; }
  .event-title.earnings { color:#c7d2fe; }
  .event-meta { font-size:10px; color:#555; margin-top:2px; }
  .actual-ok  { color:#4ade80; font-weight:600; }
  .actual-bad { color:#f87171; font-weight:600; }
  .actual-neutral { color:#94a3b8; font-weight:600; }

  /* News feed */
  .news-item {
    display: flex; gap: 10px; padding: 7px 10px;
    border-radius: 6px; margin-bottom: 3px; background: #111;
    border-left: 3px solid transparent; cursor: pointer;
  }
  .news-item.lvl1 { border-left-color: #ef4444; background: #150808; }
  .news-item.lvl2 { border-left-color: #f59e0b; background: #12100a; }
  .news-item.trump { border-left-color: #f43f5e; background: #130810; }
  .news-item.normal { border-left-color: #1f2937; }

  .news-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 3px; flex-shrink: 0; margin-top: 2px; height: fit-content;
  }
  .badge-lvl1  { background:#ef4444; color:#fff; }
  .badge-lvl2  { background:#f59e0b; color:#000; }
  .badge-trump { background:#f43f5e; color:#fff; }
  .badge-news  { background:#1f2937; color:#9ca3af; }

  .news-title { font-size:12px; color:#d1d5db; line-height:1.4; }
  .news-title.lvl1 { color:#fca5a5; }
  .news-title.trump { color:#fda4af; }
  .news-meta { font-size:10px; color:#4b5563; margin-top:2px; }

  .legend { display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:#555; }
  .legend-dot { width:6px; height:6px; border-radius:50%; }

  .loader { text-align:center; color:#444; padding:30px; font-size:12px; }
  .last-update { text-align:right; color:#2a2a2a; font-size:10px; margin-top:10px; }

  .news-count {
    font-size:10px; color:#f59e0b; background:#1a140a;
    border-radius:3px; padding:1px 6px; margin-left:6px;
  }
</style>
</head>
<body>

<h1>📅 Macro Calendar</h1>
<p class="subtitle" id="current-time">Chargement...</p>

<!-- Bandeau statut fenêtre -->
<div id="window-status" class="alert-banner alert-safe">
  <span>⏱</span>
  <span id="window-text">Calcul...</span>
</div>

<!-- Alertes news live (niveau 1) -->
<div id="live-alerts"></div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="setTab('today')">Aujourd'hui</div>
  <div class="tab" onclick="setTab('week')">Cette semaine</div>
  <div class="tab" onclick="setTab('news')">Live News <span id="news-badge" class="news-count" style="display:none"></span></div>
</div>

<!-- Légende -->
<div class="legend" id="legend-events">
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Haut</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Moyen</div>
  <div class="legend-item"><div class="legend-dot" style="background:#818cf8"></div> Earnings</div>
</div>
<div class="legend" id="legend-news" style="display:none">
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Niveau 1</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Niveau 2</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div> Trump</div>
</div>

<div id="main-container">
  <div class="loader">Chargement...</div>
</div>

<div class="last-update" id="last-update"></div>

<script>
// ── Config ─────────────────────────────────────────────────

const KEYWORDS_LVL1 = [
  'war declared','military attack','nuclear','bank collapse','market halt',
  'circuit breaker','emergency declaration','debt default','sovereign default',
  'federal reserve emergency','rate cut emergency','pandemic','terrorist attack',
  'market closed','trading halted','flash crash'
];

const KEYWORDS_LVL2 = [
  'tariff','tariffs','sanction','sanctions','fed chair','powell speaks',
  'fomc','rate hike','rate cut','inflation surges','cpi beats','jobs report',
  'unemployment','gdp','recession','earnings beat','earnings miss',
  'china trade','ukraine','iran','oil price spike','yield spike',
  'debt ceiling','government shutdown','banking crisis'
];

// Trump uniquement sur actions concrètes, pas les opinions/drama
const KEYWORDS_TRUMP = [
  'trump tariff','trump sanction','trump sign','trump order','trump announces',
  'trump declares','trump imposes','trump threatens','trump executive',
  'trump fires','trump bans','trump deal','trump trade','trump tax',
  'trump market','trump fed','trump rate','trump china','trump iran'
];

// ── State ──────────────────────────────────────────────────

let currentTab = 'today';
let allEvents = [];
let allNews = [];
let lvl1News = [];

// ── Helpers ────────────────────────────────────────────────

function nowFR() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
}
function nowET() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}
function toFRTime(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris' });
}
function toFRDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short', timeZone:'Europe/Paris' });
}
function isSameDay(dateStr, refDate) {
  const dFR = new Date(new Date(dateStr).toLocaleString('en-US', { timeZone:'Europe/Paris' }));
  return dFR.toDateString() === refDate.toDateString();
}
function isThisWeek(dateStr) {
  const d = new Date(dateStr), now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate()-now.getDay()); ws.setHours(0,0,0,0);
  const we = new Date(ws); we.setDate(ws.getDate()+7);
  return d >= ws && d < we;
}
function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 1) return 'à l\'instant';
  if (diff < 60) return `il y a ${diff}min`;
  if (diff < 1440) return `il y a ${Math.floor(diff/60)}h`;
  return toFRDate(dateStr);
}
function classifyNews(title) {
  const t = title.toLowerCase();
  if (KEYWORDS_LVL1.some(k => t.includes(k))) return 'lvl1';
  if (KEYWORDS_TRUMP.some(k => t.includes(k))) return 'trump';
  if (KEYWORDS_LVL2.some(k => t.includes(k))) return 'lvl2';
  return 'normal';
}

// ── Fenêtre 19h-21h ───────────────────────────────────────

function updateWindowStatus(events, news) {
  const todayFR = new Date(nowFR().toDateString());
  const risky = events.filter(e => {
    if (!isSameDay(e.date, todayFR)) return false;
    const hr = new Date(new Date(e.date).toLocaleString('en-US',{timeZone:'Europe/Paris'})).getHours();
    return hr >= 17 && hr <= 23 && (e.impact==='High' || e.type==='earnings');
  });
  const recentLvl1 = news.filter(n => n.level==='lvl1' || n.level==='trump');
  const el = document.getElementById('window-status');
  const txt = document.getElementById('window-text');

  if (recentLvl1.length > 0) {
    el.className = 'alert-banner alert-danger';
    txt.textContent = `🚨 ALERTE LIVE — ${recentLvl1[0].title.substring(0,60)}...`;
  } else if (risky.length > 0) {
    el.className = 'alert-banner alert-caution';
    txt.textContent = `⚡ Fenêtre 19h–21h — ${risky[0].title} détecté`;
  } else {
    el.className = 'alert-banner alert-safe';
    txt.textContent = `✅ Fenêtre 19h–21h SAFE — Aucun event majeur`;
  }
}

// ── Live alerts (niveau 1 seulement) ─────────────────────

function renderLiveAlerts(news) {
  const container = document.getElementById('live-alerts');
  const urgent = news.filter(n => n.level === 'lvl1');
  if (urgent.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = urgent.slice(0,2).map(n => `
    <div class="news-alert">
      <div class="news-alert-label">🚨 Alerte Niveau 1</div>
      <div class="news-alert-title">${n.title}</div>
      <div class="news-alert-source">${n.source} · ${timeAgo(n.date)}</div>
    </div>
  `).join('');
}

// ── Fetch ForexFactory ─────────────────────────────────────

async function fetchMacro() {
  try {
    const res = await fetch('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
    const data = await res.json();
    return data
      .filter(e => e.country === 'USD' && e.impact !== 'Holiday' && e.impact !== 'Low')
      .map(e => ({
        title: e.title, date: e.date, impact: e.impact,
        forecast: e.forecast, previous: e.previous,
        actual: e.actual || '', country: e.country, type: 'macro'
      }));
  } catch(err) { return []; }
}

// ── Fetch Earnings (Finnhub free public endpoint) ─────────

async function fetchEarnings() {
  try {
    const symbols = ['AAPL','MSFT','NVDA','META','GOOGL','AMZN','TSLA','AMD','NFLX','ORCL'];
    const today = new Date();
    const from = today.toISOString().split('T')[0];
    const to = new Date(today.getTime()+7*86400000).toISOString().split('T')[0];
    const res = await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${from}&to=${to}&token=cveq1q9r01qhup9fctcgcveq1q9r01qhup9fctd0`);
    const data = await res.json();
    if (!data.earningsCalendar) return [];
    return data.earningsCalendar
      .filter(e => symbols.includes(e.symbol))
      .map(e => ({
        title: `Earnings ${e.symbol}`,
        date: e.date+'T'+(e.hour==='amc'?'22':'14')+':00:00-04:00',
        impact: 'High', forecast: '', previous: '',
        actual: '', country: 'USD', type: 'earnings',
        symbol: e.symbol, hour: e.hour==='amc'?'Après clôture':'Avant ouverture'
      }));
  } catch(err) { return []; }
}

// ── Fetch News (MarketWatch + Yahoo via rss2json) ──────────

async function fetchNews() {
  const sources = [
    'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines',
    'https://finance.yahoo.com/rss/topstories'
  ];
  let items = [];
  for (const src of sources) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src)}`);
      const data = await res.json();
      if (data.status === 'ok' && data.items) {
        items = items.concat(data.items.map(i => ({
          title: i.title,
          date: i.pubDate,
          link: i.link,
          source: data.feed?.title || 'News',
          level: classifyNews(i.title)
        })));
      }
    } catch(e) {}
  }
  // Dédupliquer par titre
  const seen = new Set();
  return items.filter(i => {
    if (seen.has(i.title)) return false;
    seen.add(i.title); return true;
  }).sort((a,b) => new Date(b.date)-new Date(a.date));
}

// ── Render Events ──────────────────────────────────────────

function renderEvents() {
  const container = document.getElementById('main-container');
  const todayFR = new Date(nowFR().toDateString());

  let filtered = allEvents.filter(e =>
    currentTab === 'today' ? isSameDay(e.date, todayFR) : isThisWeek(e.date)
  ).sort((a,b) => new Date(a.date)-new Date(b.date));

  if (!filtered.length) {
    container.innerHTML = '<div class="loader">Aucun événement majeur</div>';
    return;
  }

  let html = '';
  let lastDay = '';

  filtered.forEach(e => {
    const day = toFRDate(e.date);
    if (currentTab === 'week' && day !== lastDay) {
      html += `<div class="day-label">${day}</div>`;
      lastDay = day;
    }
    const cls = e.type==='earnings' ? 'earnings' : e.impact.toLowerCase();
    const time = toFRTime(e.date);
    let actualHtml = '';
    if (e.actual) {
      const fc = parseFloat(e.forecast);
      const ac = parseFloat(e.actual);
      let cls2 = 'actual-neutral';
      if (!isNaN(fc) && !isNaN(ac)) cls2 = ac > fc ? 'actual-ok' : 'actual-bad';
      actualHtml = `<span class="${cls2}">→ ${e.actual}</span>`;
    }
    const valHtml = (e.forecast||e.previous||e.actual) ? `
      <div style="font-size:10px;margin-top:2px;color:#666">
        ${e.forecast?`<span style="color:#818cf8">Prév: ${e.forecast}</span> `:''}
        ${e.previous?`<span style="color:#4b5563">Préc: ${e.previous}</span> `:''}
        ${actualHtml}
      </div>` : '';

    html += `
      <div class="event ${cls}">
        <div class="event-dot"></div>
        <div class="event-time">${time}</div>
        <div class="event-body">
          <div class="event-title ${cls}">${e.title}${e.type==='earnings'?` <span style="font-size:10px;color:#6b7280">${e.hour||''}</span>`:''}</div>
          ${valHtml}
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

// ── Render News ────────────────────────────────────────────

function renderNews() {
  const container = document.getElementById('main-container');
  if (!allNews.length) {
    container.innerHTML = '<div class="loader">Chargement des news...</div>';
    return;
  }

  // Trier: lvl1 > trump > lvl2 > normal, puis par date
  const priority = {lvl1:0, trump:1, lvl2:2, normal:3};
  const sorted = [...allNews].sort((a,b) => {
    if (priority[a.level] !== priority[b.level]) return priority[a.level]-priority[b.level];
    return new Date(b.date)-new Date(a.date);
  });

  const html = sorted.slice(0, 30).map(n => {
    const badgeMap = {
      lvl1: '<span class="news-badge badge-lvl1">ALERTE</span>',
      trump: '<span class="news-badge badge-trump">TRUMP</span>',
      lvl2: '<span class="news-badge badge-lvl2">VOL</span>',
      normal: '<span class="news-badge badge-news">NEWS</span>'
    };
    return `
      <div class="news-item ${n.level}" onclick="window.open('${n.link}','_blank')">
        ${badgeMap[n.level]}
        <div class="event-body">
          <div class="news-title ${n.level}">${n.title}</div>
          <div class="news-meta">${n.source} · ${timeAgo(n.date)}</div>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = html;
}

// ── Tabs ───────────────────────────────────────────────────

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active',
      (i===0&&tab==='today')||(i===1&&tab==='week')||(i===2&&tab==='news'));
  });
  const isNews = tab === 'news';
  document.getElementById('legend-events').style.display = isNews ? 'none' : 'flex';
  document.getElementById('legend-news').style.display = isNews ? 'flex' : 'none';
  if (isNews) renderNews(); else renderEvents();
}

// ── Init ───────────────────────────────────────────────────

function updateClock() {
  const fr = nowFR(), et = nowET();
  document.getElementById('current-time').textContent =
    `🕐 ${fr.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} FR  |  ${et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} ET`;
}

async function refreshNews() {
  const news = await fetchNews();
  allNews = news;
  lvl1News = news.filter(n => n.level === 'lvl1');

  // Badge count
  const important = news.filter(n => n.level !== 'normal');
  const badge = document.getElementById('news-badge');
  if (important.length > 0) {
    badge.textContent = important.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }

  renderLiveAlerts(news);
  updateWindowStatus(allEvents, news);
  if (currentTab === 'news') renderNews();
  document.getElementById('last-update').textContent =
    `Mis à jour à ${nowFR().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
}

async function init() {
  try {
    const [macro, earnings] = await Promise.all([fetchMacro(), fetchEarnings()]);
    allEvents = [...macro, ...earnings];
    await refreshNews();
    renderEvents();
  } catch(err) {
    document.getElementById('main-container').innerHTML =
      `<div style="color:#f87171;padding:20px;font-size:12px">Erreur de chargement — vérifie ta connexion</div>`;
  }
}

updateClock();
setInterval(updateClock, 1000);
init();
setInterval(init, 5 * 60 * 1000);         // Refresh macro toutes les 5min
setInterval(refreshNews, 90 * 1000);       // Refresh news toutes les 90s

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
